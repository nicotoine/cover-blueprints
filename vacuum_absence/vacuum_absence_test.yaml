# ============================================================================
# VERSION DE TEST - Nettoyage intelligent (déclenchement manuel)
# ============================================================================
# À supprimer après les tests.
# Lancer depuis : Paramètres > Automatisations > clic sur l'automatisation
#   > menu 3 points > Exécuter
# ============================================================================

blueprint:
  name: "[TEST] Roborock - Nettoyage intelligent (manuel)"
  description: >
    Version de test du blueprint de nettoyage intelligent.
    Se lance manuellement, sans condition d'alarme ni de présence.
  domain: automation

  input:
    vacuum_only_button:
      name: Bouton aspiration seule
      description: "Ex: button.roborock_qv_35a_aspiration_complete"
      selector:
        entity:
          filter:
            - domain: button

    mop_button:
      name: Bouton aspiration + lavage
      description: "Ex: button.roborock_qv_35a_nettoyage_complet"
      selector:
        entity:
          filter:
            - domain: button

    days_threshold:
      name: Jours avant lavage automatique
      default: 2
      selector:
        number:
          min: 1
          max: 14
          unit_of_measurement: jours
          mode: slider

    last_mop_tracker:
      name: Tracker du dernier lavage
      selector:
        entity:
          filter:
            - domain: input_datetime

mode: single

variables:
  days: !input days_threshold
  tracker: !input last_mop_tracker
  needs_mop: "{{ (as_timestamp(now()) - (states(tracker) | as_timestamp(default=0))) > (days * 86400) }}"

triggers:
  - trigger: event
    event_type: manual_trigger_never_fires

actions:
  # Log pour debug
  - action: system_log.write
    data:
      message: "[TEST VACUUM] tracker={{ tracker }} | state={{ states(tracker) }} | needs_mop={{ needs_mop }}"
      level: warning

  # Lance le bon bouton selon le dernier lavage
  - if:
      - condition: template
        value_template: "{{ needs_mop }}"
    then:
      - action: button.press
        target:
          entity_id: !input mop_button
    else:
      - action: button.press
        target:
          entity_id: !input vacuum_only_button

  # Met à jour le tracker si lavage effectué
  - if:
      - condition: template
        value_template: "{{ needs_mop }}"
    then:
      - action: input_datetime.set_datetime
        target:
          entity_id: !input last_mop_tracker
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
