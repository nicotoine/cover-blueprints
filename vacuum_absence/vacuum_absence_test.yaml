# ============================================================================
# VERSION DE TEST - Nettoyage intelligent (déclenchement manuel)
# ============================================================================
# À supprimer après les tests.
# Lancer depuis : Paramètres > Automatisations > clic sur l'automatisation
#   > menu 3 points > Exécuter
# ============================================================================

blueprint:
  name: "[TEST] Roborock - Nettoyage intelligent (manuel)"
  description: >
    Version de test du blueprint de nettoyage intelligent.
    Se lance manuellement, sans condition d'alarme ni de présence.
  domain: automation

  input:
    vacuum_entity:
      name: Aspirateur Roborock
      description: Utilisé pour confirmer que le robot démarre bien avant de valider le tracker.
      selector:
        entity:
          filter:
            - domain: vacuum

    vacuum_only_actions:
      name: Actions aspiration seule
      description: >
        Actions exécutées quand le dernier lavage est récent.
        Ex: appuyer sur le bouton "aspiration complète".
      default: []
      selector:
        action:

    mop_actions:
      name: Actions aspiration + lavage
      description: >
        Actions exécutées quand le dernier lavage remonte à plus
        de X jours. Ex: appuyer sur le bouton "nettoyage complet".
      default: []
      selector:
        action:

    always_actions:
      name: Actions systématiques (optionnel)
      description: >
        Actions exécutées à chaque fois, quel que soit le mode.
        Ex: nettoyage litière.
      default: []
      selector:
        action:

    days_threshold:
      name: Jours avant lavage automatique
      default: 2
      selector:
        number:
          min: 1
          max: 14
          unit_of_measurement: jours
          mode: slider

    last_mop_tracker:
      name: Tracker du dernier lavage
      selector:
        entity:
          filter:
            - domain: input_datetime

mode: single

variables:
  days: !input days_threshold
  tracker: !input last_mop_tracker
  needs_mop: "{{ (as_timestamp(now()) - (states(tracker) | as_timestamp(default=0))) > (days * 86400) }}"

triggers:
  - trigger: event
    event_type: manual_trigger_never_fires

actions:
  # Log pour debug
  - action: system_log.write
    data:
      message: "[TEST VACUUM] tracker={{ tracker }} | state={{ states(tracker) }} | needs_mop={{ needs_mop }}"
      level: warning

  # Actions systématiques
  - choose: []
    default: !input always_actions

  # Actions selon le mode
  - if:
      - condition: template
        value_template: "{{ needs_mop }}"
    then: !input mop_actions
    else: !input vacuum_only_actions

  # Attend que le robot démarre réellement
  - wait_for_trigger:
      - trigger: state
        entity_id: !input vacuum_entity
        to: "cleaning"
    timeout:
      minutes: 3
    continue_on_timeout: true

  # Log du résultat du wait
  - action: system_log.write
    data:
      message: "[TEST VACUUM] wait.completed={{ wait.completed }} | tracker sera mis à jour: {{ needs_mop and wait.completed }}"
      level: warning

  # Met à jour le tracker uniquement si le robot a bien démarré
  - if:
      - condition: template
        value_template: "{{ needs_mop and wait.completed }}"
    then:
      - action: input_datetime.set_datetime
        target:
          entity_id: !input last_mop_tracker
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
