# ============================================================================
# BLUEPRINT : Routine Roborock planifiée
# ============================================================================
# Fichier à placer dans :
#   config/blueprints/automation/roborock/vacuum_scheduled.yaml
#
# Fonctionnement :
#   - Se déclenche à heure(s) fixe(s) (jusqu'à 2 horaires par jour)
#   - Vérifie l'état de l'alarme avant de lancer
#   - Vérifie que l'aspirateur est à la base (évite les conflits)
#   - Fréquence configurable (0 = à chaque déclenchement)
#   - Actions entièrement configurables (boutons Roborock, services, etc.)
#
# Exemples d'utilisation :
#   - Litière à 9h et 18h sauf en mode nuit
#   - Aspiration cuisine tous les jours à 14h si personne à la maison
#   - Nettoyage complet tous les 3 jours à 10h si absent
# ============================================================================

blueprint:
  name: "Roborock - Routine planifiée"
  description: >
    Lance une routine Roborock à heures fixes avec conditions sur
    l'état de l'alarme et fréquence configurable.
    Créer une automatisation par routine souhaitée.
  domain: automation

  input:
    # -- Section Aspirateur --
    aspirateur:
      name: Aspirateur
      collapsed: false
      input:
        vacuum_entity:
          name: Aspirateur Roborock
          description: >
            Vérifie que l'aspirateur est à la base avant de lancer.
            Évite les conflits si une autre routine est en cours.
          selector:
            entity:
              filter:
                - domain: vacuum

    # -- Section Horaires --
    horaires:
      name: Horaires
      collapsed: false
      input:
        trigger_time_1:
          name: Horaire 1
          description: Première heure de déclenchement.
          default: "09:00:00"
          selector:
            time:

        trigger_time_2:
          name: Horaire 2 (optionnel)
          description: >
            Deuxième heure de déclenchement.
            Mettre la même heure que l'horaire 1 pour désactiver.
          default: "09:00:00"
          selector:
            time:

    # -- Section Conditions --
    conditions:
      name: Conditions
      collapsed: false
      input:
        alarm_entity:
          name: Panneau d'alarme (Alarmo)
          description: L'entité de ton système d'alarme.
          selector:
            entity:
              filter:
                - domain: alarm_control_panel

        allowed_alarm_states:
          name: États d'alarme autorisés
          description: >
            Liste des états d'alarme qui permettent l'exécution,
            séparés par des virgules.
            Possibles : disarmed, armed_home, armed_away, armed_night
          default: "disarmed,armed_home,armed_away"
          selector:
            text:

    # -- Section Fréquence --
    frequence:
      name: Fréquence
      collapsed: true
      input:
        days_threshold:
          name: Jours minimum entre passages
          description: >
            Nombre minimum de jours entre deux exécutions.
            0 = exécuter à chaque déclenchement (pas de limite).
          default: 0
          selector:
            number:
              min: 0
              max: 14
              unit_of_measurement: jours
              mode: slider

        last_run_tracker:
          name: Tracker du dernier passage
          description: >
            Un helper input_datetime (date + heure) pour enregistrer
            la date du dernier passage de cette routine.

            Pour le créer : Paramètres > Appareils > Entrées >
            Créer une entrée > Date et/ou heure (cocher date ET heure).

            Chaque routine doit avoir son propre tracker.
          selector:
            entity:
              filter:
                - domain: input_datetime

    # -- Section Actions --
    actions:
      name: Actions
      collapsed: false
      input:
        cleaning_actions:
          name: Actions à exécuter
          description: >
            Les actions à lancer quand toutes les conditions sont
            remplies. Ex: appuyer sur un bouton Roborock, appeler
            un service, etc.
          default: []
          selector:
            action:

mode: single
max_exceeded: silent

variables:
  alarm_entity: !input alarm_entity
  allowed_states_str: !input allowed_alarm_states
  days: !input days_threshold
  tracker: !input last_run_tracker

triggers:
  - trigger: time
    at: !input trigger_time_1
    id: "scheduled"

  - trigger: time
    at: !input trigger_time_2
    id: "scheduled"

conditions:
  # Aspirateur à la base
  - condition: state
    entity_id: !input vacuum_entity
    state: "docked"

  # État d'alarme autorisé
  - condition: template
    value_template: "{{ states(alarm_entity) in (allowed_states_str.split(',') | map('trim') | list) }}"

  # Fréquence respectée (0 = pas de limite)
  - condition: template
    value_template: "{{ days == 0 or (as_timestamp(now()) - (states(tracker) | as_timestamp(default=0))) > (days * 86400) }}"

actions:
  # Exécute les actions configurées
  - choose: []
    default: !input cleaning_actions

  # Met à jour le tracker
  - action: input_datetime.set_datetime
    target:
      entity_id: !input last_run_tracker
    data:
      datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
