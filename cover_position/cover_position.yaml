# ============================================================================
# BLUEPRINT : Controle de volet par position estimee
# ============================================================================
# Fonctionnement :
#   - Controle le volet via un slider de position cible (0-100%)
#   - Detecte aussi les boutons ouvrir/fermer et commandes vocales
#   - Met a jour la position en temps reel (chaque seconde)
#   - Gere les appels consecutifs via mode restart
#   - Arret du suivi si le volet est stoppe manuellement
#   - Recalibrage automatique en mode nuit (Alarmo)
#   - Bouton de synchro manuelle
#
# Prerequis (par volet) :
#   - Un input_number "position actuelle" (min: 0, max: 100, pas: 1)
#   - Un input_number "position cible" (min: 0, max: 100, pas: 1)
#   - Un input_button pour la synchro manuelle
# ============================================================================

blueprint:
  name: "Volet - Controle par position estimee"
  description: >
    Controle un volet sans retour de position en estimant sa position
    par le temps de course. Compatible avec le slider, les boutons
    ouvrir/fermer et les commandes vocales. La position se met a jour
    en temps reel. Recalibrage automatique chaque nuit via Alarmo.
    0% = ferme, 100% = ouvert.
  domain: automation

  input:
    volet:
      name: Volet
      collapsed: false
      input:
        cover_entity:
          name: Volet
          description: L'entite cover du volet.
          selector:
            entity:
              filter:
                - domain: cover

        travel_time:
          name: Temps de course complet (secondes)
          description: >
            Duree pour une ouverture ou fermeture complete.
            Verifie dans l'entite number.xxx_time_control de ton volet.
          default: 70
          selector:
            number:
              min: 10
              max: 300
              unit_of_measurement: secondes

        position_helper:
          name: Position actuelle (input_number)
          description: >
            Affiche la position estimee en temps reel (0-100%).
            Cree un input_number : min 0, max 100, pas 1.
            Mis a jour automatiquement, ne pas modifier manuellement.
          selector:
            entity:
              filter:
                - domain: input_number

        target_helper:
          name: Position cible (input_number)
          description: >
            Slider pour controler le volet au pourcentage.
            Cree un input_number : min 0, max 100, pas 1.
          selector:
            entity:
              filter:
                - domain: input_number

    synchro:
      name: Synchronisation
      collapsed: false
      input:
        alarm_entity:
          name: Panneau d'alarme (Alarmo)
          description: Recalibrage automatique au passage en mode nuit.
          selector:
            entity:
              filter:
                - domain: alarm_control_panel

        sync_button:
          name: Bouton de synchronisation (input_button)
          description: >
            Ferme le volet completement et remet la position a 0%.
          selector:
            entity:
              filter:
                - domain: input_button

mode: restart

variables:
  cover_id: !input cover_entity
  position_helper: !input position_helper
  target_helper: !input target_helper
  travel_time: !input travel_time

triggers:
  # Slider de position cible modifie
  - trigger: state
    entity_id: !input target_helper
    id: "target_changed"

  # Volet en ouverture (bouton HA, voix, ou commande du blueprint)
  - trigger: state
    entity_id: !input cover_entity
    to: "opening"
    id: "cover_opening"

  # Volet en fermeture (bouton HA, voix, ou commande du blueprint)
  - trigger: state
    entity_id: !input cover_entity
    to: "closing"
    id: "cover_closing"

  # Alarmo mode nuit -> recalibrage
  - trigger: state
    entity_id: !input alarm_entity
    to: "armed_night"
    id: "night_recalib"

  # Bouton synchro -> recalibrage
  - trigger: state
    entity_id: !input sync_button
    id: "manual_recalib"

actions:
  - choose:
      # --- Cible modifiee via slider : stopper et relancer ---
      # Le cover_opening/closing prendra le relais via restart
      - conditions:
          - condition: trigger
            id: "target_changed"
        sequence:
          - action: cover.stop_cover
            target:
              entity_id: !input cover_entity
          - delay: 1
          - variables:
              current_pos: "{{ states(position_helper) | float(0) }}"
              target_pos: "{{ states(target_helper) | float(0) }}"
              direction: "{{ 'open' if target_pos > current_pos else 'close' }}"
          - condition: template
            value_template: "{{ ((target_pos - current_pos) | abs) > 0 }}"
          - if:
              - condition: template
                value_template: "{{ direction == 'open' }}"
            then:
              - action: cover.open_cover
                target:
                  entity_id: !input cover_entity
            else:
              - action: cover.close_cover
                target:
                  entity_id: !input cover_entity

      # --- Ouverture detectee : suivre la position ---
      - conditions:
          - condition: trigger
            id: "cover_opening"
        sequence:
          - variables:
              current_pos: "{{ states(position_helper) | float(0) }}"
              # Si la cible a ete modifiee recemment, on l'utilise
              # Sinon c'est un appui direct/voix -> ouvrir a 100%
              target_pos: >
                {% if (as_timestamp(now()) - as_timestamp(states[target_helper].last_changed)) < 5 %}
                  {{ states(target_helper) | float(100) }}
                {% else %}
                  100
                {% endif %}
              distance: "{{ ((target_pos | float) - current_pos) | abs }}"
              duration: "{{ (distance / 100 * (travel_time | float)) | round(0) | int }}"
              step_per_sec: "{{ 100 / (travel_time | float) }}"
          - condition: template
            value_template: "{{ duration > 0 }}"
          - repeat:
              while:
                - condition: template
                  value_template: "{{ repeat.index <= duration and is_state(cover_id, 'opening') }}"
              sequence:
                - delay: 1
                - action: input_number.set_value
                  target:
                    entity_id: !input position_helper
                  data:
                    value: "{{ [100, ((current_pos + step_per_sec * repeat.index) | round(0))] | min }}"
          # Verifier si mouvement complet ou arret premature
          - if:
              - condition: template
                value_template: "{{ is_state(cover_id, 'opening') }}"
            then:
              # Mouvement complet : arreter et position exacte
              - action: cover.stop_cover
                target:
                  entity_id: !input cover_entity
              - action: input_number.set_value
                target:
                  entity_id: !input position_helper
                data:
                  value: "{{ (target_pos | float) | round(0) }}"
              - action: input_number.set_value
                target:
                  entity_id: !input target_helper
                data:
                  value: "{{ (target_pos | float) | round(0) }}"
            else:
              # Arret premature (stop) : synchroniser la cible
              - action: input_number.set_value
                target:
                  entity_id: !input target_helper
                data:
                  value: "{{ states(position_helper) | float(0) | round(0) }}"

      # --- Fermeture detectee : suivre la position ---
      - conditions:
          - condition: trigger
            id: "cover_closing"
        sequence:
          - variables:
              current_pos: "{{ states(position_helper) | float(100) }}"
              target_pos: >
                {% if (as_timestamp(now()) - as_timestamp(states[target_helper].last_changed)) < 5 %}
                  {{ states(target_helper) | float(0) }}
                {% else %}
                  0
                {% endif %}
              distance: "{{ (current_pos - (target_pos | float)) | abs }}"
              duration: "{{ (distance / 100 * (travel_time | float)) | round(0) | int }}"
              step_per_sec: "{{ 100 / (travel_time | float) }}"
          - condition: template
            value_template: "{{ duration > 0 }}"
          - repeat:
              while:
                - condition: template
                  value_template: "{{ repeat.index <= duration and is_state(cover_id, 'closing') }}"
              sequence:
                - delay: 1
                - action: input_number.set_value
                  target:
                    entity_id: !input position_helper
                  data:
                    value: "{{ [0, ((current_pos - step_per_sec * repeat.index) | round(0))] | max }}"
          - if:
              - condition: template
                value_template: "{{ is_state(cover_id, 'closing') }}"
            then:
              - action: cover.stop_cover
                target:
                  entity_id: !input cover_entity
              - action: input_number.set_value
                target:
                  entity_id: !input position_helper
                data:
                  value: "{{ (target_pos | float) | round(0) }}"
              - action: input_number.set_value
                target:
                  entity_id: !input target_helper
                data:
                  value: "{{ (target_pos | float) | round(0) }}"
            else:
              - action: input_number.set_value
                target:
                  entity_id: !input target_helper
                data:
                  value: "{{ states(position_helper) | float(0) | round(0) }}"

      # --- Recalibrage (nuit ou manuel) ---
      - conditions:
          - condition: or
            conditions:
              - condition: trigger
                id: "night_recalib"
              - condition: trigger
                id: "manual_recalib"
        sequence:
          # Fermer le volet : cover_closing prend le relais
          # et track la fermeture vers 0%
          - action: cover.close_cover
            target:
              entity_id: !input cover_entity
