# ============================================================================
# BLUEPRINT : Controle de volet par position estimee
# ============================================================================
# Fonctionnement :
#   - Controle le volet via un slider de position cible (0-100%)
#   - Calcule la duree de mouvement basee sur le temps de course
#   - Met a jour la position en temps reel (chaque seconde)
#   - Gere les appels consecutifs : stop + recalcul automatique
#   - Recalibrage automatique en mode nuit (Alarmo)
#   - Bouton de synchro manuelle pour forcer un recalibrage
#
# Prerequis (par volet) :
#   - Un input_number "position actuelle" (min: 0, max: 100, pas: 1)
#   - Un input_number "position cible" (min: 0, max: 100, pas: 1)
#   - Un input_button pour la synchro manuelle
# ============================================================================

blueprint:
  name: "Volet - Controle par position estimee"
  description: >
    Controle un volet sans retour de position en estimant sa position
    par le temps de course. Utilisez le slider "position cible" pour
    deplacer le volet au pourcentage souhaite. La position se met a
    jour en temps reel. Recalibrage automatique chaque nuit via Alarmo.
    0% = ferme, 100% = ouvert.
  domain: automation

  input:
    volet:
      name: Volet
      collapsed: false
      input:
        cover_entity:
          name: Volet
          description: L'entite cover du volet.
          selector:
            entity:
              filter:
                - domain: cover

        travel_time:
          name: Temps de course complet (secondes)
          description: >
            Duree pour une ouverture ou fermeture complete.
            Verifie dans l'entite number.xxx_time_control de ton volet.
          default: 70
          selector:
            number:
              min: 10
              max: 300
              unit_of_measurement: secondes

        position_helper:
          name: Position actuelle (input_number)
          description: >
            Affiche la position estimee en temps reel (0-100%).
            Cree un input_number : min 0, max 100, pas 1.
            Ne pas modifier manuellement.
          selector:
            entity:
              filter:
                - domain: input_number

        target_helper:
          name: Position cible (input_number)
          description: >
            Slider pour controler le volet. Quand tu changes cette
            valeur, le volet se deplace automatiquement.
            Cree un input_number : min 0, max 100, pas 1.
          selector:
            entity:
              filter:
                - domain: input_number

    synchro:
      name: Synchronisation
      collapsed: false
      input:
        alarm_entity:
          name: Panneau d'alarme (Alarmo)
          description: Recalibrage automatique au passage en mode nuit.
          selector:
            entity:
              filter:
                - domain: alarm_control_panel

        sync_button:
          name: Bouton de synchronisation (input_button)
          description: >
            Ferme le volet completement et remet la position a 0%.
          selector:
            entity:
              filter:
                - domain: input_button

mode: restart

variables:
  cover_id: !input cover_entity
  position_helper: !input position_helper
  target_helper: !input target_helper
  travel_time: !input travel_time

triggers:
  # L'utilisateur change la position cible
  - trigger: state
    entity_id: !input target_helper
    id: "target_changed"

  # Alarmo passe en mode nuit -> recalibrage
  - trigger: state
    entity_id: !input alarm_entity
    to: "armed_night"
    id: "night_recalib"

  # Bouton de synchro appuye -> recalibrage
  - trigger: state
    entity_id: !input sync_button
    id: "manual_recalib"

actions:
  - choose:
      # --- Deplacement vers la position cible ---
      - conditions:
          - condition: trigger
            id: "target_changed"
        sequence:
          # Stopper tout mouvement en cours
          - action: cover.stop_cover
            target:
              entity_id: !input cover_entity
          - delay: 1

          # Calculer le mouvement necessaire
          - variables:
              current_pos: "{{ states(position_helper) | float(0) }}"
              target_pos: "{{ states(target_helper) | float(0) }}"
              distance: "{{ (target_pos - current_pos) | abs }}"
              duration: "{{ (distance / 100 * (travel_time | float)) | round(0) | int }}"
              direction: "{{ 'open' if target_pos > current_pos else 'close' }}"
              step_per_sec: "{{ 100 / (travel_time | float) }}"

          # Rien a faire si deja a la bonne position
          - condition: template
            value_template: "{{ duration > 0 }}"

          # Lancer le mouvement
          - if:
              - condition: template
                value_template: "{{ direction == 'open' }}"
            then:
              - action: cover.open_cover
                target:
                  entity_id: !input cover_entity
            else:
              - action: cover.close_cover
                target:
                  entity_id: !input cover_entity

          # Mise a jour en temps reel chaque seconde
          - repeat:
              count: "{{ duration }}"
              sequence:
                - delay: 1
                - action: input_number.set_value
                  target:
                    entity_id: !input position_helper
                  data:
                    value: >
                      {% if direction == 'open' %}
                        {{ [100, ((current_pos + step_per_sec * repeat.index) | round(0))] | min }}
                      {% else %}
                        {{ [0, ((current_pos - step_per_sec * repeat.index) | round(0))] | max }}
                      {% endif %}

          # Arreter et finaliser
          - action: cover.stop_cover
            target:
              entity_id: !input cover_entity
          - action: input_number.set_value
            target:
              entity_id: !input position_helper
            data:
              value: "{{ target_pos | round(0) }}"

      # --- Recalibrage (nuit ou manuel) -> fermer et remettre a 0% ---
      - conditions:
          - condition: or
            conditions:
              - condition: trigger
                id: "night_recalib"
              - condition: trigger
                id: "manual_recalib"
        sequence:
          - action: cover.close_cover
            target:
              entity_id: !input cover_entity
          - delay:
              seconds: "{{ (travel_time | int) + 5 }}"
          - action: input_number.set_value
            target:
              entity_id: !input position_helper
            data:
              value: 0
          - action: input_number.set_value
            target:
              entity_id: !input target_helper
            data:
              value: 0
