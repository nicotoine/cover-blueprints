# ============================================================================
# BLUEPRINT : Controle de volet par position estimee
# ============================================================================
# Fonctionne avec un template cover qui route toutes les commandes
# (boutons, voix, slider, set_position) vers la cible.
# Le blueprint gere le mouvement et la mise a jour en temps reel.
#
# Voir README pour la configuration du template cover.
#
# Prerequis (par volet) :
#   - Un template cover dans configuration.yaml
#   - Un input_number "position" (min: 0, max: 100, pas: 1)
#   - Un input_number "cible" (min: 0, max: 100, pas: 1)
#   - Un input_button pour la synchro (partage possible)
# ============================================================================

blueprint:
  name: "Volet - Controle par position estimee"
  description: >
    Controle un volet sans retour de position en estimant sa position
    par le temps de course. Fonctionne avec un template cover pour
    supporter boutons, voix et slider nativement.
    0% = ferme, 100% = ouvert.
  domain: automation

  input:
    volet:
      name: Volet
      collapsed: false
      input:
        cover_entity:
          name: Volet reel
          description: >
            L'entite cover REELLE du volet (pas le template cover).
            Ex: cover.volet_cuisine
          selector:
            entity:
              filter:
                - domain: cover

        travel_time:
          name: Temps de course complet (secondes)
          description: >
            Duree pour une ouverture ou fermeture complete.
            Verifie dans l'entite number.xxx_time_control de ton volet.
          default: 70
          selector:
            number:
              min: 10
              max: 300
              unit_of_measurement: secondes

        position_helper:
          name: Position actuelle (input_number)
          description: >
            input_number (min: 0, max: 100, pas: 1).
            Mis a jour automatiquement chaque seconde.
          selector:
            entity:
              filter:
                - domain: input_number

        target_helper:
          name: Position cible (input_number)
          description: >
            input_number (min: 0, max: 100, pas: 1).
            Modifie par le template cover (boutons, voix, slider).
          selector:
            entity:
              filter:
                - domain: input_number

    synchro:
      name: Synchronisation
      collapsed: false
      input:
        alarm_entity:
          name: Panneau d'alarme (Alarmo)
          description: Recalibrage automatique au passage en mode nuit.
          selector:
            entity:
              filter:
                - domain: alarm_control_panel

        sync_button:
          name: Bouton de synchronisation (input_button)
          description: >
            Ferme le volet completement et remet la position a 0%.
          selector:
            entity:
              filter:
                - domain: input_button

mode: restart

variables:
  cover_id: !input cover_entity
  position_helper: !input position_helper
  target_helper: !input target_helper
  travel_time: !input travel_time

triggers:
  # Cible modifiee (par template cover, slider, ou recalibrage)
  - trigger: state
    entity_id: !input target_helper
    id: "target_changed"

  # Alarmo mode nuit -> recalibrage
  - trigger: state
    entity_id: !input alarm_entity
    to: "armed_night"
    id: "night_recalib"

  # Bouton synchro -> recalibrage
  - trigger: state
    entity_id: !input sync_button
    id: "manual_recalib"

actions:
  - choose:
      # --- Deplacement vers la cible ---
      - conditions:
          - condition: trigger
            id: "target_changed"
        sequence:
          # Stopper tout mouvement en cours
          - action: cover.stop_cover
            target:
              entity_id: !input cover_entity
          - delay: 1

          # Calculer le mouvement
          - variables:
              current_pos: "{{ states(position_helper) | float(0) }}"
              target_pos: "{{ states(target_helper) | float(0) }}"
              distance: "{{ (target_pos - current_pos) | abs }}"
              duration: "{{ (distance / 100 * (travel_time | float)) | round(0) | int }}"
              direction: "{{ 'open' if target_pos > current_pos else 'close' }}"
              step_per_sec: "{{ 100 / (travel_time | float) }}"

          # Rien a faire si deja a la bonne position
          - condition: template
            value_template: "{{ duration > 0 }}"

          # Lancer le mouvement sur le vrai volet
          - if:
              - condition: template
                value_template: "{{ direction == 'open' }}"
            then:
              - action: cover.open_cover
                target:
                  entity_id: !input cover_entity
            else:
              - action: cover.close_cover
                target:
                  entity_id: !input cover_entity

          # Mise a jour en temps reel chaque seconde
          - repeat:
              count: "{{ duration }}"
              sequence:
                - delay: 1
                - action: input_number.set_value
                  target:
                    entity_id: !input position_helper
                  data:
                    value: >
                      {% if direction == 'open' %}
                        {{ [100, ((current_pos + step_per_sec * repeat.index) | round(0))] | min }}
                      {% else %}
                        {{ [0, ((current_pos - step_per_sec * repeat.index) | round(0))] | max }}
                      {% endif %}

          # Arreter et finaliser
          - action: cover.stop_cover
            target:
              entity_id: !input cover_entity
          - action: input_number.set_value
            target:
              entity_id: !input position_helper
            data:
              value: "{{ target_pos | round(0) }}"

      # --- Recalibrage (nuit ou manuel) ---
      # Force la position a 100% puis cible a 0% pour garantir
      # une fermeture complete sur tout le temps de course
      - conditions:
          - condition: or
            conditions:
              - condition: trigger
                id: "night_recalib"
              - condition: trigger
                id: "manual_recalib"
        sequence:
          - action: input_number.set_value
            target:
              entity_id: !input position_helper
            data:
              value: 100
          - action: input_number.set_value
            target:
              entity_id: !input target_helper
            data:
              value: 0
