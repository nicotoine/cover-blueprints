# ============================================================================
# BLUEPRINT 3 : Surveillance aspirateur & rappels
# ============================================================================
# Fichier à placer dans :
#   config/blueprints/automation/roborock/vacuum_monitoring.yaml
#
# Fonctionnement :
#   - Envoie une notification si l'aspirateur est en erreur
#   - Envoie un rappel si l'aspirateur n'est pas passé depuis X jours
#   - Le rappel inclut un bouton pour lancer le nettoyage directement
#   - Met à jour automatiquement le tracker quand l'aspirateur finit
# ============================================================================

blueprint:
  name: "Roborock - Surveillance, rappels & tracker"
  description: >
    Surveille ton aspirateur Roborock : alerte en cas d'erreur,
    rappel si pas de nettoyage depuis X jours avec bouton actionnable
    pour lancer directement, et mise à jour automatique du tracker
    de dernier passage.
  domain: automation

  input:
    # -- Section Aspirateur --
    aspirateur:
      name: Aspirateur
      collapsed: false
      input:
        vacuum_entity:
          name: Aspirateur Roborock
          selector:
            entity:
              filter:
                - domain: vacuum

        room_ids:
          name: IDs des pièces (pour le lancement via notification)
          description: >
            Liste des IDs séparés par des virgules (ex: 9,8,5,7,1).
            Utilisés quand tu cliques "Lancer maintenant" dans la notification.
          default: "9,8,5,7,1"
          selector:
            text:

    # -- Section Rappels --
    rappels:
      name: Rappels
      collapsed: false
      input:
        last_clean_tracker:
          name: Tracker du dernier nettoyage
          description: >
            Le même helper **input_datetime** que dans le blueprint
            "Nettoyage complet".

            **Pour le créer** : Paramètres > Appareils > Entrées >
            Créer une entrée > Date et/ou heure (cocher date ET heure).
          selector:
            entity:
              filter:
                - domain: input_datetime

        reminder_days:
          name: Rappel après X jours sans passage
          description: >
            Nombre de jours sans nettoyage avant d'envoyer un rappel.
          default: 3
          selector:
            number:
              min: 1
              max: 14
              unit_of_measurement: jours

        reminder_time:
          name: Heure du rappel
          description: À quelle heure envoyer le rappel.
          default: "19:00:00"
          selector:
            time:

    # -- Section Notifications --
    notifications:
      name: Notifications
      collapsed: true
      input:
        notify_service:
          name: Service de notification
          default: notify.notify
          selector:
            text:

        notify_on_error:
          name: Alerter en cas d'erreur
          description: Envoyer une notification si l'aspirateur se bloque.
          default: true
          selector:
            boolean:

        auto_track_clean:
          name: Tracker automatique
          description: >
            Met à jour automatiquement la date du dernier nettoyage
            quand l'aspirateur revient à sa base.
          default: true
          selector:
            boolean:

mode: parallel
max: 5

variables:
  room_ids_str: !input room_ids
  room_ids_list: "{{ room_ids_str.split(',') | map('trim') | map('int') | list }}"
  days: !input reminder_days
  threshold_seconds: "{{ days * 86400 }}"
  tracker: !input last_clean_tracker
  notification_service: !input notify_service
  do_error_notify: !input notify_on_error
  do_auto_track: !input auto_track_clean

triggers:
  # Trigger 1 : Rappel quotidien
  - trigger: time
    at: !input reminder_time
    id: "daily_check"

  # Trigger 2 : Aspirateur en erreur
  - trigger: state
    entity_id: !input vacuum_entity
    to: "error"
    id: "vacuum_error"

  # Trigger 3 : Aspirateur revient à la base (tracker)
  - trigger: state
    entity_id: !input vacuum_entity
    from: "returning"
    to: "docked"
    id: "vacuum_docked"

  # Trigger 4 : Réponse notification actionnable
  - trigger: event
    event_type: mobile_app_notification_action
    event_data:
      action: "LAUNCH_VACUUM_NOW"
    id: "notif_launch"

actions:
  - choose:
      # --- Rappel si trop longtemps sans nettoyage ---
      - conditions:
          - condition: trigger
            id: "daily_check"
          - condition: template
            value_template: >
              {% set dernier = states(tracker) %}
              {% if dernier not in ['unknown', 'unavailable', 'None', ''] %}
                {{ (now() - strptime(dernier, '%Y-%m-%d %H:%M:%S')).total_seconds() > threshold_seconds }}
              {% else %}
                true
              {% endif %}
        sequence:
          - action: "{{ notification_service }}"
            data:
              title: "Rappel nettoyage"
              message: >
                L'aspirateur n'est pas passé depuis plus de {{ days }} jours.
                Voulez-vous lancer un nettoyage ?
              data:
                actions:
                  - action: "LAUNCH_VACUUM_NOW"
                    title: "Lancer maintenant"
                  - action: "DISMISS_VACUUM_REMINDER"
                    title: "Plus tard"

      # --- Alerte erreur ---
      - conditions:
          - condition: trigger
            id: "vacuum_error"
          - condition: template
            value_template: "{{ do_error_notify }}"
        sequence:
          - action: "{{ notification_service }}"
            data:
              title: "Aspirateur bloqué"
              message: >
                L'aspirateur a rencontré un problème et s'est arrêté.
                Vérifie s'il n'est pas coincé ou si le bac est plein.

      # --- Tracker : mise à jour automatique ---
      - conditions:
          - condition: trigger
            id: "vacuum_docked"
          - condition: template
            value_template: "{{ do_auto_track }}"
        sequence:
          - action: input_datetime.set_datetime
            target:
              entity_id: !input last_clean_tracker
            data:
              datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

      # --- Lancement depuis la notification ---
      - conditions:
          - condition: trigger
            id: "notif_launch"
          - condition: state
            entity_id: !input vacuum_entity
            state: "docked"
        sequence:
          - action: vacuum.send_command
            target:
              entity_id: !input vacuum_entity
            data:
              command: app_segment_clean
              params:
                - segments: "{{ room_ids_list }}"
                  repeat: 1
          - action: input_datetime.set_datetime
            target:
              entity_id: !input last_clean_tracker
            data:
              datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
